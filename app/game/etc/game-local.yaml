Name: game-service
Host: 0.0.0.0
Port: 8080
InstanceId: "local-dev"
WebStaticDir: "./client-web"

Cluster:
  Enabled: false
  InstanceId: ""
  Host: "127.0.0.1"
  Port: 8080

Redis:
  Host: localhost:6379
  Type: node
  Pass: "123456"
  Tls: false
  ClusterNodes: []
  SentinelMaster: ""
  SentinelNodes: []

MySQL:
  DSN: root:root@tcp(127.0.0.1:3306)/ddz?charset=utf8mb4&parseTime=True&loc=Local

WebSocket:
  ReadBufferSize: 4096
  WriteBufferSize: 4096
  HandshakeTimeout: 10
  PingPeriod: 30
  PongWait: 60
  MaxMessageSize: 65536
  WriteWait: 10

Room:
  MaxRooms: 1000
  MaxPlayersPerRoom: 3
  ReadyTimeout: 60
  PlayTimeout: 15
  ReconnectTimeout: 300
  SnapshotInterval: 30
  BotJoinTimeout: 5

Match:
  Enabled: true
  ScanInterval: 2
  RandomTimeout: 15
  RankedTimeout: 30
  EloRange: 100
  BotFillTimeout: 30

AI:
  Enabled: true
  DefaultDifficulty: "normal"
  AutoEnableTimeout: 30
  PlayDelayMin: 3000
  PlayDelayMax: 5000

Log:
  Mode: console
  Level: debug
  Compress: false
  KeepDays: 7

Metrics:
  Enabled: false
  Path: /metrics
