version: '3.8'

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=123456
      - REDIS_DATABASES=16
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  mariadb-server:
    image: mariadb:10.1
    container_name: mariadb-server
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ddz
      MYSQL_USER: ddz
      MYSQL_PASSWORD: ddz123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  game-1:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - REDIS_HOST=redis:6379
      - MYSQL_DSN=root:root@tcp(mysql:3306)/ddz?parseTime=true
    depends_on:
      redis:
        condition: service_healthy
      mariadb-server:
        condition: service_healthy
    restart: unless-stopped

  game-2:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      - REDIS_HOST=redis:6379
      - MYSQL_DSN=root:root@tcp(mariadb-server:3306)/ddz?parseTime=true
    depends_on:
      redis:
        condition: service_healthy
      mariadb-server:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - game-1
      - game-2
    restart: unless-stopped

volumes:
  redis-data:
  mysql-data:
