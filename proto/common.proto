syntax = "proto3";
package ddz.proto;
option go_package = "go-zero-ddz/proto/ddzpb";

// ============================================
// 牌相关类型
// ============================================

// 牌面值
enum CardValue {
  CARD_VALUE_UNKNOWN = 0;
  CARD_VALUE_3 = 3;
  CARD_VALUE_4 = 4;
  CARD_VALUE_5 = 5;
  CARD_VALUE_6 = 6;
  CARD_VALUE_7 = 7;
  CARD_VALUE_8 = 8;
  CARD_VALUE_9 = 9;
  CARD_VALUE_10 = 10;
  CARD_VALUE_J = 11;
  CARD_VALUE_Q = 12;
  CARD_VALUE_K = 13;
  CARD_VALUE_A = 14;
  CARD_VALUE_2 = 15;
  CARD_VALUE_JOKER_SMALL = 16; // 小王
  CARD_VALUE_JOKER_BIG = 17;   // 大王
}

// 花色（仅用于前端显示）
enum CardSuit {
  CARD_SUIT_UNKNOWN = 0;
  CARD_SUIT_SPADE = 1;   // 黑桃 ♠
  CARD_SUIT_HEART = 2;   // 红桃 ♥
  CARD_SUIT_CLUB = 3;    // 梅花 ♣
  CARD_SUIT_DIAMOND = 4; // 方块 ♦
  CARD_SUIT_JOKER = 5;   // 王牌
}

// 单张牌
message Card {
  CardValue value = 1;
  CardSuit suit = 2;
}

// 牌型
enum CardPattern {
  PATTERN_UNKNOWN = 0;
  PATTERN_SINGLE = 1;        // 单张
  PATTERN_PAIR = 2;          // 对子
  PATTERN_TRIPLE = 3;        // 三条
  PATTERN_TRIPLE_ONE = 4;    // 三带一
  PATTERN_TRIPLE_TWO = 5;    // 三带二
  PATTERN_STRAIGHT = 6;      // 顺子
  PATTERN_STRAIGHT_PAIR = 7; // 连对
  PATTERN_AIRPLANE = 8;      // 飞机
  PATTERN_AIRPLANE_WINGS = 9; // 飞机带翅膀
  PATTERN_FOUR_TWO = 10;     // 四带二
  PATTERN_BOMB = 11;         // 炸弹
  PATTERN_ROCKET = 12;       // 王炸
}

// ============================================
// 玩家相关类型
// ============================================

// 玩家角色
enum PlayerRole {
  ROLE_UNKNOWN = 0;
  ROLE_LANDLORD = 1;  // 地主
  ROLE_PEASANT = 2;   // 农民
}

// 玩家信息
message PlayerInfo {
  string uid = 1;
  string nickname = 2;
  uint32 avatar_id = 3;
  int32 elo = 4;
  string tier = 5;             // 段位
  bool is_bot = 6;             // 是否机器人
  bool is_online = 7;          // 是否在线
  bool is_ready = 8;           // 是否准备
  bool is_landlord = 9;        // 是否地主
  repeated Card cards = 10;    // 手牌（仅自己可见完整手牌）
  int32 card_count = 11;       // 剩余牌数（其他人可见）
  int32 score = 12;            // 本局得分
  bool is_ai_controlled = 13;  // 是否 AI 托管中
  PlayerRole role = 14;        // 角色（地主/农民）
}

// ============================================
// 房间/游戏状态类型
// ============================================

// 房间状态
enum RoomState {
  ROOM_STATE_WAITING = 0;     // 等待中
  ROOM_STATE_DEALING = 1;     // 发牌中
  ROOM_STATE_CALLING = 2;     // 叫地主中
  ROOM_STATE_PLAYING = 3;     // 出牌中
  ROOM_STATE_SETTLEMENT = 4;  // 结算中
}

// 游戏状态
message GameState {
  RoomState state = 1;
  string room_id = 2;
  repeated PlayerInfo players = 3;
  string landlord_uid = 4;
  string current_turn_uid = 5; // 当前回合玩家 UID
  int32 timer = 6;             // 倒计时（秒）
  int32 base_score = 7;        // 基础分
  int32 multiplier = 8;        // 倍数
  repeated Card last_played_cards = 9;  // 上一手出的牌
  string last_played_uid = 10;          // 上一手出牌玩家 UID
  CardPattern last_pattern = 11;        // 上一手牌型
  int32 pass_count = 12;                // 连续 Pass 次数
  repeated Card bottom_cards = 13;      // 底牌（仅地主可见）
  int32 call_score = 14;                // 当前叫分
}

// ============================================
// 出牌记录
// ============================================

message PlayRecord {
  string uid = 1;
  repeated Card cards = 2;
  CardPattern pattern = 3;
  int64 timestamp = 4;
}

// ============================================
// 结算结果
// ============================================

message PlayerResult {
  string uid = 1;
  bool is_landlord = 2;
  int32 score_change = 3;   // 积分变化（正=增加，负=减少）
  int32 new_elo = 4;        // 新 ELO
  string new_tier = 5;      // 新段位
  bool is_promoted = 6;     // 是否升段
  bool is_demoted = 7;      // 是否降段
  int32 gold_change = 8;    // 金币变化
}
