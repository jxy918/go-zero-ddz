syntax = "proto3";
package ddz.proto;
option go_package = "go-zero-ddz/proto/ddzpb";

import "common.proto";

// ============================================
// 消息 ID 分配
// ============================================
// 系统消息:     0x0000 - 0x00FF
//   0x0001      HeartbeatReq
//   0x0002      HeartbeatResp
//   0x0003      ErrorResponse
//
// 认证消息:     0x0100 - 0x01FF
//   0x0101      LoginReq
//   0x0102      LoginResp
//   0x0103      LogoutReq
//
// 房间消息:     0x0200 - 0x02FF
//   0x0201      CreateRoomReq       0x0202      CreateRoomResp
//   0x0203      JoinRoomReq         0x0204      JoinRoomResp
//   0x0205      LeaveRoomReq        0x0206      RoomStateNotify
//   0x0207      PlayerReadyReq      0x0208      PlayerReadyNotify
//
// 匹配消息:     0x0300 - 0x03FF
//   0x0301      MatchStartReq       0x0302      MatchCancelReq
//   0x0303      MatchSuccessNotify  0x0304      MatchTimeoutNotify
//
// 游戏消息:     0x0400 - 0x04FF
//   0x0401      DealCardsNotify     0x0402      CallLandlordReq
//   0x0403      CallLandlordNotify  0x0404      PlayCardsReq
//   0x0405      PlayCardsNotify     0x0406      PassNotify
//   0x0407      GameEndNotify       0x0408      TimerNotify
//
// 断线重连:     0x0500 - 0x05FF
//   0x0501      ReconnectReq        0x0502      ReconnectResp
//
// 聊天消息:     0x0600 - 0x06FF
//   0x0601      ChatReq             0x0602      ChatNotify

// ============================================
// 系统消息 (0x0000 - 0x00FF)
// ============================================

message HeartbeatReq {
  int64 client_timestamp = 1; // 客户端时间戳（毫秒）
}

message HeartbeatResp {
  int64 server_timestamp = 1; // 服务器时间戳（毫秒）
  int32 ping = 2;             // 延迟（毫秒）
}

message ErrorResponse {
  int32 code = 1;
  string message = 2;
  int32 msg_id = 3; // 原始消息 ID
}

// ============================================
// 认证消息 (0x0100 - 0x01FF)
// ============================================

message LoginReq {
  string token = 1;           // JWT Token
  string device_id = 2;       // 设备 ID
  string client_version = 3;  // 客户端版本
}

message LoginResp {
  bool success = 1;
  string uid = 2;
  string nickname = 3;
  uint32 avatar_id = 4;
  int32 elo = 5;
  string tier = 6;
  int32 gold = 7;
  string session_key = 8; // 会话密钥（后续消息签名用）
}

message LogoutReq {
  string reason = 1;
}

// ============================================
// 房间消息 (0x0200 - 0x02FF)
// ============================================

message CreateRoomReq {
  bool is_private = 1;  // 是否私密房间
  string password = 2;  // 房间密码（私密房间）
}

message CreateRoomResp {
  bool success = 1;
  string room_id = 2;
  string error = 3;
}

message JoinRoomReq {
  string room_id = 1;
  string password = 2;
}

message JoinRoomResp {
  bool success = 1;
  GameState game_state = 2;
  string error = 3;
}

message LeaveRoomReq {
  string reason = 1;
}

message RoomStateNotify {
  GameState game_state = 1;
  string event = 2;            // 事件类型: player_joined, player_left, player_ready
  PlayerInfo player = 3;       // 相关玩家
}

message PlayerReadyReq {}

message PlayerReadyNotify {
  string uid = 1;
  bool is_ready = 2;
}

// ============================================
// 匹配消息 (0x0300 - 0x03FF)
// ============================================

message MatchStartReq {
  enum MatchType {
    MATCH_TYPE_RANDOM = 0; // 随机匹配
    MATCH_TYPE_RANKED = 1; // 段位匹配
  }
  MatchType match_type = 1;
}

message MatchCancelReq {}

message MatchSuccessNotify {
  string room_id = 1;
  repeated PlayerInfo players = 2;
  bool is_ranked = 3;
  int32 estimated_wait = 4; // 预估等待时间（秒）
}

message MatchTimeoutNotify {
  int32 waited_seconds = 1;
  string suggestion = 2; // 建议: "add_bot", "cancel", "continue_wait"
}

// ============================================
// 游戏消息 (0x0400 - 0x04FF)
// ============================================

message DealCardsNotify {
  repeated Card my_cards = 1;      // 我的手牌
  repeated Card bottom_cards = 2;  // 底牌（仅地主可见，其他人空）
  int32 first_caller_index = 3;    // 第一个叫地主的玩家索引
}

message CallLandlordReq {
  enum CallAction {
    CALL_ACTION_PASS = 0; // 不叫
    CALL_ACTION_CALL = 1; // 叫分 (1-3分)
  }
  CallAction action = 1;
  int32 score = 2; // 叫分 (1-3)，action=CALL 时有效
}

message CallLandlordNotify {
  string uid = 1;
  CallLandlordReq.CallAction action = 2;
  int32 score = 3;
  string landlord_uid = 4;        // 确定地主后填充
  repeated Card landlord_cards = 5; // 地主获得的底牌
}

message PlayCardsReq {
  repeated Card cards = 1; // 要出的牌，空表示 Pass
}

message PlayCardsNotify {
  string uid = 1;
  repeated Card cards = 2;
  CardPattern pattern = 3;
  int32 card_count = 4; // 出牌后剩余牌数
  bool is_last = 5;     // 是否出完（春天判定）
}

message PassNotify {
  string uid = 1;
}

message GameEndNotify {
  string winner_uid = 1;
  enum WinnerSide {
    WINNER_SIDE_LANDLORD = 0;
    WINNER_SIDE_PEASANT = 1;
  }
  WinnerSide winner_side = 2;
  repeated PlayerResult results = 3;
  int32 base_score = 4;
  int32 multiplier = 5;
  bool is_spring = 6;         // 是否春天
  bool is_counter_spring = 7; // 是否反春
}

message TimerNotify {
  int32 remaining_seconds = 1;
  string current_turn_uid = 2;
}

// ============================================
// 断线重连 (0x0500 - 0x05FF)
// ============================================

message ReconnectReq {
  string session_key = 1; // 会话密钥
  string room_id = 2;     // 原房间 ID
}

message ReconnectResp {
  bool success = 1;
  GameState game_state = 2;  // 完整房间状态
  repeated Card my_cards = 3; // 我的手牌
  string error = 4;
}

// ============================================
// 聊天消息 (0x0600 - 0x06FF)
// ============================================

message ChatReq {
  enum ChatType {
    CHAT_TYPE_TEXT = 0;
    CHAT_TYPE_EMOJI = 1;
    CHAT_TYPE_VOICE = 2;
  }
  ChatType chat_type = 1;
  string content = 2; // 文本内容 / 表情 ID / 语音 ID
}

message ChatNotify {
  string uid = 1;
  ChatReq.ChatType chat_type = 2;
  string content = 3;
}
